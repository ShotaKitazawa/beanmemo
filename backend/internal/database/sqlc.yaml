version: "2"
sql:
  - engine: "sqlite"
    queries: "queries/"
    schema: "schema.sql"
    gen:
      go:
        package: "sqlcgen"
        out: "sqlcgen"
        sql_package: "database/sql"
        emit_json_tags: true
        emit_prepared_queries: false
        emit_interface: false
        emit_exact_table_names: false
        emit_empty_slices: true
        emit_result_struct_pointers: false
        emit_params_struct_pointers: false
        emit_methods_with_db_argument: false
        overrides:
          - db_type: "datetime"
            go_type:
              import: "time"
              type: "Time"
          - db_type: "boolean"
            go_type: "bool"
          - db_type: "tinyint"
            go_type: "int8"
          - db_type: "date"
            nullable: true
            go_type:
              import: "database/sql"
              type: "NullTime"
          - db_type: "int"
            nullable: true
            go_type:
              import: "database/sql"
              type: "NullInt32"
