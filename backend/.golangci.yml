version: "2"

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - gocritic
    - noctx
    - bodyclose

formatters:
  enable:
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/ShotaKitazawa/beanmemo

issues:
  exclude-dirs:
    - ogen
    - db/sqlcgen
