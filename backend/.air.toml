root = "."
tmp_dir = "/tmp/air"

[build]
cmd        = "go build -o /tmp/air/server ./cmd/server"
bin        = "/tmp/air/server"
include_ext = ["go"]
exclude_dir = ["db", "ogen", "hack"]
delay      = 500

[log]
time = false

[color]
main    = "magenta"
watcher = "cyan"
build   = "yellow"
runner  = "green"

[misc]
clean_on_exit = true
