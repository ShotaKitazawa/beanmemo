services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    command: ["air", "-c", ".air.toml", "--", "--disable-oidc"]
    ports:
      - "8080:8080"
    environment:
      DSN: ${DSN:-beanmemo.db}
      PORT: ${PORT:-8080}
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    environment:
      BACKEND_URL: http://backend:8080
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend

volumes:
  frontend_node_modules:
