[tools]
go   = "1.25"
node = "24.14"
pnpm = "10.33"

# ──────────────────────────────────────────
# Dev
# ──────────────────────────────────────────

[tasks.dev]
description = "Start dev environment (mysql + backend with air + frontend with pnpm dev)"
dir         = "{{config_root}}"
run         = "docker compose -f docker-compose.dev.yml up --build"

# ──────────────────────────────────────────
# Code generation
# ──────────────────────────────────────────

[tasks.generate]
description = "Generate all code (ogen, sqlc, openapi-typescript)"
depends     = ["generate:backend", "generate:frontend"]

[tasks."generate:backend"]
description = "Generate Go code from openapi.yaml (ogen) and SQL queries (sqlc)"
dir         = "{{config_root}}/backend"
run         = "go generate ./..."

[tasks."generate:frontend"]
description = "Generate TypeScript types from openapi.yaml"
dir         = "{{config_root}}/frontend"
run         = "pnpm run generate:api"

[tasks."install:backend"]
description = "Download Go modules declared in go.mod/go.sum"
dir         = "{{config_root}}/backend"
run         = "go mod download"

[tasks."install:frontend"]
description = "Install frontend dependencies respecting minimumReleaseAge: runs pnpm install, auto-pins any violating packages to their latest compliant version via pnpm.overrides"
dir         = "{{config_root}}"
run         = "node scripts/install_frontend.ts"

# ──────────────────────────────────────────
# Pre-merge
# ──────────────────────────────────────────

[tasks."pre-merge"]
description = "Run before merging a PR: code generation, format, then full CI (build/vet/lint/deps-age)"
run = """
mise run generate
mise run format
mise run ci
"""

[tasks.format]
description = "Auto-format all source files"
depends     = ["format:backend", "format:frontend"]

[tasks."format:backend"]
description = "Auto-format Go source files with gofmt"
dir         = "{{config_root}}/backend"
run         = "go fmt ./..."

# ──────────────────────────────────────────
# Test
# ──────────────────────────────────────────

[tasks."test:backend"]
description = "Run Go unit tests for the backend"
depends     = ["install:backend"]
dir         = "{{config_root}}/backend"
run         = "go test ./..."

# ──────────────────────────────────────────
# CI
# ──────────────────────────────────────────

[tasks.ci]
description = "Run all CI checks (build, vet, lint, test, deps-age)"
depends     = ["ci:build-backend", "ci:build-frontend", "ci:lint-backend", "ci:lint-frontend", "ci:test-frontend", "ci:test-backend", "ci:deps-backend"]

[tasks."ci:test-backend"]
description = "Run Go unit tests for the backend (CI)"
depends     = ["test:backend"]

[tasks."ci:build-backend"]
description = "Build and vet Go backend"
depends     = ["install:backend"]
dir         = "{{config_root}}/backend"
run         = """
go build ./...
go vet ./...
"""

[tasks."ci:build-frontend"]
description = "TypeScript check + Vite production build"
depends     = ["install:frontend"]
dir         = "{{config_root}}/frontend"
run         = "pnpm run build"

[tasks."ci:lint-backend"]
description = "Lint Go backend with golangci-lint"
depends     = ["install:backend"]
dir         = "{{config_root}}/backend"
run         = "go run github.com/golangci/golangci-lint/v2/cmd/golangci-lint run ./..."

[tasks."ci:lint-frontend"]
description = "Lint + format-check + typecheck frontend"
depends     = ["install:frontend"]
dir         = "{{config_root}}/frontend"
run         = """
pnpm run lint
pnpm run format:check
pnpm run typecheck
"""

[tasks."format:frontend"]
description = "Auto-format frontend source files with oxfmt"
depends     = ["install:frontend"]
dir         = "{{config_root}}/frontend"
run         = "pnpm run format"

[tasks."ci:test-frontend"]
description = "Run frontend unit tests with Vitest"
depends     = ["install:frontend"]
dir         = "{{config_root}}/frontend"
run         = "pnpm run test"

[tasks."ci:deps-backend"]
description = "Ensure all Go dependencies were released >= 1 week ago"
depends     = ["install:backend"]
dir         = "{{config_root}}"
run         = "node scripts/check_deps_age_backend.ts"
